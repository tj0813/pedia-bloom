<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_55 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_55" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_55');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Ambient light
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);

// Directional light for depth
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// Create floating 3D "Seeds of Knowledge" (soft spheres with glow)
const spheres = [];
const geometry = new THREE.SphereGeometry(0.5, 32, 32);

for (let i = 0; i < 8; i++) {
    const material = new THREE.MeshPhongMaterial({
        color: new THREE.Color(Math.random() * 0.5 + 0.5, 1, 0.9), // Teal-ish colors
        shininess: 100,
        transparent: true,
        opacity: 0.6
    });
    
    const sphere = new THREE.Mesh(geometry, material);
    
    // Random positions
    sphere.position.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 4
    );
    
    // Random scale
    const scale = Math.random() * 0.5 + 0.2;
    sphere.scale.set(scale, scale, scale);
    
    // Store movement properties
    sphere.userData = {
        speed: Math.random() * 0.01 + 0.005,
        offset: Math.random() * Math.PI * 2,
        rotSpeed: Math.random() * 0.02
    };
    
    scene.add(sphere);
    spheres.push(sphere);
}

function animate() {
    requestAnimationFrame(animate);
    
    const time = Date.now() * 0.001;
    
    spheres.forEach((sphere, i) => {
        sphere.position.y += Math.sin(time + sphere.userData.offset) * 0.002;
        sphere.position.x += Math.cos(time + sphere.userData.offset) * 0.001;
        sphere.rotation.x += sphere.userData.rotSpeed;
        sphere.rotation.y += sphere.userData.rotSpeed;
    });
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_55 -->
</body>
</html>
