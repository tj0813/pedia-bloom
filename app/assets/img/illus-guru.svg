<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9d4"/>
      <stop offset="0.65" stop-color="#fff4e8"/>
      <stop offset="1" stop-color="#f5fbef"/>
    </linearGradient>
    <linearGradient id="grBoard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4caf50"/>
      <stop offset="1" stop-color="#006e1c"/>
    </linearGradient>
    <linearGradient id="grFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e18500"/>
      <stop offset="1" stop-color="#8b5000"/>
    </linearGradient>
    <linearGradient id="grSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdcbe"/>
      <stop offset="1" stop-color="#e8b88a"/>
    </linearGradient>
    <linearGradient id="grHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2410"/>
      <stop offset="1" stop-color="#171d16"/>
    </linearGradient>
    <linearGradient id="grShirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <linearGradient id="grBook" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6f6f"/>
      <stop offset="1" stop-color="#ba1a1a"/>
    </linearGradient>
    <radialGradient id="grShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#171d16" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#171d16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="300" fill="url(#grBg)"/>
  <!-- floor band -->
  <path d="M0 256 H400 V300 H0 Z" fill="#ffdcbe" opacity="0.6"/>
  <path d="M0 256 H400" stroke="#e18500" stroke-width="3" opacity="0.4"/>

  <!-- green chalkboard -->
  <g stroke="#5a3208" stroke-width="4" stroke-linejoin="round">
    <rect x="40" y="44" width="208" height="148" rx="10" fill="url(#grFrame)"/>
    <rect x="52" y="56" width="184" height="124" rx="6" fill="url(#grBoard)"/>
  </g>
  <!-- chalk tray -->
  <rect x="48" y="188" width="192" height="12" rx="4" fill="url(#grFrame)" stroke="#5a3208" stroke-width="3"/>
  <rect x="150" y="190" width="34" height="6" rx="3" fill="#f5fbef"/>
  <rect x="196" y="190" width="22" height="6" rx="3" fill="#ffdcbe"/>

  <!-- board drawings: smiling sun (NO letters/words) -->
  <g transform="translate(96 96)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ffd54a" stroke-width="3.5"/>
    <g stroke="#ffd54a" stroke-width="3.5" stroke-linecap="round">
      <path d="M0 -28 L0 -22 M0 22 L0 28 M-28 0 L-22 0 M22 0 L28 0"/>
      <path d="M-20 -20 L-16 -16 M20 -20 L16 -16 M-20 20 L-16 16 M20 20 L16 16"/>
    </g>
    <circle cx="-6" cy="-3" r="2" fill="#ffd54a"/>
    <circle cx="6" cy="-3" r="2" fill="#ffd54a"/>
    <path d="M-7 5 Q0 11 7 5" fill="none" stroke="#ffd54a" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- board drawings: simple shapes (triangle, circle, plus) -->
  <g stroke="#94f990" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M150 80 L168 116 L132 116 Z"/>
    <circle cx="196" cy="98" r="16"/>
    <path d="M150 146 L150 168 M139 157 L161 157"/>
    <path d="M186 138 L214 166 M214 138 L186 166"/>
  </g>

  <!-- soft shadow under teacher -->
  <ellipse cx="296" cy="288" rx="86" ry="14" fill="url(#grShadow)"/>

  <!-- open book on the floor / desk corner -->
  <g transform="translate(238 240) rotate(-6)">
    <path d="M0 14 Q20 4 40 12 L40 40 Q20 32 0 42 Z" fill="#f5fbef" stroke="#8b5000" stroke-width="3" stroke-linejoin="round"/>
    <path d="M80 14 Q60 4 40 12 L40 40 Q60 32 80 42 Z" fill="url(#grBook)" stroke="#8b5000" stroke-width="3" stroke-linejoin="round"/>
    <path d="M40 12 L40 40" stroke="#8b5000" stroke-width="3"/>
    <g stroke="#33a0fd" stroke-width="2" stroke-linecap="round">
      <path d="M8 20 L30 16 M8 26 L30 22 M8 32 L26 28"/>
    </g>
  </g>

  <!-- teacher body / shirt -->
  <path d="M236 300
           Q236 234 286 218
           Q310 230 332 218
           Q360 234 360 300 Z"
        fill="url(#grShirt)" stroke="#0061a4" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- collar -->
  <path d="M286 220 L298 244 L284 252 L278 230 Z" fill="#f5fbef" stroke="#9aa593" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M332 220 L320 244 L334 252 L340 230 Z" fill="#f5fbef" stroke="#9aa593" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M298 244 L320 244 L309 268 Z" fill="#94f990" stroke="#0061a4" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- pointing arm toward board -->
  <g stroke="#0061a4" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M278 244 Q230 244 196 218 L186 226 Q224 264 280 262 Z" fill="url(#grShirt)"/>
  </g>
  <!-- pointing hand + finger -->
  <g transform="translate(176 214)" stroke="#c98b5e" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round">
    <path d="M0 10 Q-2 0 8 -2 L24 -2 Q30 0 28 8 L14 12 Q4 18 0 16 Z" fill="url(#grSkin)"/>
    <path d="M8 -2 L-12 -8" fill="none"/>
    <path d="M-12 -10 Q-20 -10 -20 -6 Q-20 -2 -12 -3 Z" fill="url(#grSkin)"/>
  </g>

  <!-- neck -->
  <path d="M300 200 L300 222 Q316 232 332 222 L332 200 Z" fill="url(#grSkin)" stroke="#c98b5e" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- ears -->
  <ellipse cx="285" cy="158" rx="8" ry="12" fill="url(#grSkin)" stroke="#c98b5e" stroke-width="2.5"/>
  <ellipse cx="347" cy="158" rx="8" ry="12" fill="url(#grSkin)" stroke="#c98b5e" stroke-width="2.5"/>

  <!-- face -->
  <path d="M290 142
           Q290 108 316 106
           Q342 108 342 142
           Q342 186 316 198
           Q290 186 290 142 Z"
        fill="url(#grSkin)" stroke="#c98b5e" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- hair (neat bun + side) -->
  <path d="M286 138
           Q282 96 316 92
           Q350 96 346 138
           Q342 118 322 112
           Q312 110 316 110
           Q298 110 290 124
           Q287 130 286 138 Z"
        fill="url(#grHair)" stroke="#0a0d09" stroke-width="3.5" stroke-linejoin="round"/>
  <circle cx="316" cy="88" r="14" fill="url(#grHair)" stroke="#0a0d09" stroke-width="3.5"/>
  <path d="M294 118 Q316 104 338 118" fill="none" stroke="#4a3018" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>

  <!-- eyebrows -->
  <path d="M298 144 Q307 140 316 144" fill="none" stroke="#3a2410" stroke-width="3" stroke-linecap="round"/>
  <path d="M316 144 Q325 140 334 144" fill="none" stroke="#3a2410" stroke-width="3" stroke-linecap="round"/>

  <!-- eyes -->
  <circle cx="307" cy="155" r="4" fill="#171d16"/>
  <circle cx="325" cy="155" r="4" fill="#171d16"/>
  <circle cx="305.8" cy="153.8" r="1.4" fill="#ffffff"/>
  <circle cx="323.8" cy="153.8" r="1.4" fill="#ffffff"/>

  <!-- cheeks -->
  <g fill="#ba1a1a" opacity="0.18">
    <circle cx="300" cy="170" r="7"/>
    <circle cx="332" cy="170" r="7"/>
  </g>

  <!-- nose -->
  <path d="M316 158 L313 170 Q316 173 319 170 Z" fill="#e8b88a" stroke="#c98b5e" stroke-width="2" stroke-linejoin="round"/>

  <!-- warm smile -->
  <path d="M304 180 Q316 192 328 180" fill="none" stroke="#b07a4a" stroke-width="3" stroke-linecap="round"/>
</svg>
