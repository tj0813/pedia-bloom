<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="spSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="0.7" stop-color="#9ecdfb"/>
      <stop offset="1" stop-color="#ffdcbe"/>
    </linearGradient>
    <linearGradient id="spGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94f990"/>
      <stop offset="1" stop-color="#4caf50"/>
    </linearGradient>
    <linearGradient id="spSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdcbe"/>
      <stop offset="1" stop-color="#e8b88a"/>
    </linearGradient>
    <linearGradient id="spPangsi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2f29"/>
      <stop offset="1" stop-color="#171d16"/>
    </linearGradient>
    <linearGradient id="spPeci" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4038"/>
      <stop offset="1" stop-color="#171d16"/>
    </linearGradient>
    <linearGradient id="spSarung" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ba1a1a"/>
      <stop offset="1" stop-color="#7a0f0f"/>
    </linearGradient>
    <linearGradient id="spHouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e18500"/>
      <stop offset="1" stop-color="#8b5000"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="400" height="300" fill="url(#spSky)"/>

  <!-- warm sun glow -->
  <circle cx="318" cy="60" r="40" fill="#ffd54a" opacity="0.55"/>
  <circle cx="318" cy="60" r="26" fill="#ffd54a" opacity="0.85"/>

  <!-- soft clouds -->
  <g fill="#f5fbef" opacity="0.9">
    <ellipse cx="78" cy="50" rx="34" ry="15"/>
    <ellipse cx="104" cy="55" rx="24" ry="12"/>
    <ellipse cx="240" cy="40" rx="26" ry="12"/>
  </g>

  <!-- distant hills -->
  <ellipse cx="90" cy="210" rx="170" ry="58" fill="#4caf50" opacity="0.55"/>
  <ellipse cx="320" cy="214" rx="160" ry="54" fill="#4caf50" opacity="0.55"/>

  <!-- OLD BETAWI VILLAGE HOUSES behind -->
  <!-- left stilt house -->
  <g stroke="#3a2410" stroke-width="2.5" stroke-linejoin="round">
    <rect x="34" y="176" width="9" height="22" rx="2" fill="#8b5000"/>
    <rect x="74" y="176" width="9" height="22" rx="2" fill="#8b5000"/>
    <rect x="30" y="150" width="58" height="28" rx="4" fill="url(#spHouse)"/>
    <rect x="44" y="158" width="16" height="20" rx="2" fill="#3a2410"/>
    <path d="M22 152 L59 120 L96 152 Z" fill="#171d16"/>
  </g>
  <!-- right stilt house -->
  <g stroke="#3a2410" stroke-width="2.5" stroke-linejoin="round">
    <rect x="316" y="178" width="9" height="22" rx="2" fill="#8b5000"/>
    <rect x="358" y="178" width="9" height="22" rx="2" fill="#8b5000"/>
    <rect x="310" y="152" width="62" height="28" rx="4" fill="url(#spHouse)"/>
    <rect x="334" y="160" width="16" height="20" rx="2" fill="#3a2410"/>
    <path d="M302 154 L341 122 L380 154 Z" fill="#171d16"/>
  </g>
  <!-- gabled roof crosses (kebaya/bapang hint) -->
  <g stroke="#ffdcbe" stroke-width="2" stroke-linecap="round" opacity="0.65">
    <path d="M40 142 L78 142"/>
    <path d="M322 144 L360 144"/>
  </g>
  <!-- little palm trees -->
  <g>
    <rect x="142" y="150" width="6" height="44" rx="3" fill="#8b5000"/>
    <g fill="#006e1c" opacity="0.9">
      <path d="M145 150 Q120 138 108 148 Q128 142 145 156 Z"/>
      <path d="M145 150 Q170 138 182 148 Q162 142 145 156 Z"/>
      <path d="M145 150 Q132 126 118 124 Q138 132 145 154 Z"/>
      <path d="M145 150 Q158 126 172 124 Q152 132 145 154 Z"/>
    </g>
  </g>
  <g>
    <rect x="256" y="152" width="6" height="42" rx="3" fill="#8b5000"/>
    <g fill="#006e1c" opacity="0.9">
      <path d="M259 152 Q236 142 224 152 Q244 146 259 158 Z"/>
      <path d="M259 152 Q282 142 294 152 Q274 146 259 158 Z"/>
      <path d="M259 152 Q248 130 234 128 Q252 136 259 156 Z"/>
    </g>
  </g>

  <!-- ground -->
  <rect x="0" y="194" width="400" height="106" fill="url(#spGround)"/>
  <ellipse cx="200" cy="198" rx="240" ry="20" fill="#94f990" opacity="0.6"/>

  <!-- hero soft shadow -->
  <ellipse cx="200" cy="288" rx="92" ry="14" fill="#171d16" opacity="0.18"/>

  <!-- ===== SI PITUNG (full figure, silat ready stance) ===== -->

  <!-- back arm (his left) raised open palm -->
  <g stroke="#171d16" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M156 178 Q120 168 104 144" fill="none" stroke-width="22" stroke="#2a2f29"/>
    <path d="M156 178 Q120 168 104 144" fill="none" stroke-width="16" stroke="#2a2f29"/>
  </g>
  <!-- back hand open palm -->
  <path d="M100 146 Q90 134 96 124 Q104 120 110 128 Q116 122 120 130 Q124 126 126 134 Q130 134 128 142 Q120 156 108 156 Z"
        fill="url(#spSkin)" stroke="#c98b5e" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- legs in a wide grounded silat stance -->
  <!-- back leg (his right) -->
  <path d="M196 250 L168 286 Q166 294 176 294 L196 294 Q200 270 200 250 Z"
        fill="url(#spPangsi)" stroke="#0a0d09" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- front leg (his left) bent -->
  <path d="M204 250 L228 286 Q230 294 220 294 L200 294 Q200 270 204 250 Z"
        fill="url(#spPangsi)" stroke="#0a0d09" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- shoes -->
  <g fill="#3a2410" stroke="#171d16" stroke-width="2.5" stroke-linejoin="round">
    <path d="M162 290 L196 290 L196 296 Q178 300 160 296 Z"/>
    <path d="M204 290 L238 290 L240 296 Q222 300 204 296 Z"/>
  </g>

  <!-- torso: black pangsi shirt -->
  <path d="M168 178
           Q166 160 184 150
           Q200 156 216 150
           Q234 160 232 178
           L228 254
           Q200 264 172 254 Z"
        fill="url(#spPangsi)" stroke="#0a0d09" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- shirt open-front placket + frog buttons -->
  <path d="M200 156 L200 256" stroke="#3a4038" stroke-width="2.5" stroke-linecap="round"/>
  <g fill="#ffd54a" stroke="#8b5000" stroke-width="1.4">
    <circle cx="200" cy="182" r="2.6"/>
    <circle cx="200" cy="200" r="2.6"/>
    <circle cx="200" cy="218" r="2.6"/>
    <circle cx="200" cy="236" r="2.6"/>
  </g>
  <!-- collar -->
  <path d="M184 150 L200 168 L216 150 Q200 158 184 150 Z" fill="#3a4038" stroke="#0a0d09" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- waist sash (red) -->
  <path d="M170 244 Q200 254 230 244 L228 262 Q200 272 172 262 Z"
        fill="url(#spSarung)" stroke="#7a0f0f" stroke-width="3" stroke-linejoin="round"/>
  <!-- sash knot -->
  <path d="M214 252 L232 248 L228 264 L210 262 Z" fill="#ba1a1a" stroke="#7a0f0f" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- CHECKERED SARUNG folded over right shoulder -->
  <path d="M214 152 Q252 158 258 200 Q260 234 246 256 L226 250 Q236 220 232 188 Q228 164 210 162 Z"
        fill="#0d9488" stroke="#0a5d57" stroke-width="3" stroke-linejoin="round"/>
  <!-- sarung checkered pattern -->
  <g stroke="#f5fbef" stroke-width="2" opacity="0.85" stroke-linecap="round">
    <path d="M216 168 L250 178"/>
    <path d="M214 184 L252 196"/>
    <path d="M216 200 L254 212"/>
    <path d="M222 216 L252 228"/>
    <path d="M228 232 L250 242"/>
    <path d="M222 160 L228 252"/>
    <path d="M236 166 L242 250"/>
    <path d="M250 178 L254 236"/>
  </g>

  <!-- front arm (his right): fist forward, ready -->
  <path d="M232 184 Q262 190 280 178" fill="none" stroke="#171d16" stroke-width="22" stroke-linecap="round"/>
  <path d="M232 184 Q262 190 280 178" fill="none" stroke="#2a2f29" stroke-width="16" stroke-linecap="round"/>
  <!-- fist -->
  <circle cx="286" cy="176" r="12" fill="url(#spSkin)" stroke="#c98b5e" stroke-width="2.8"/>
  <g stroke="#c98b5e" stroke-width="1.6" stroke-linecap="round">
    <path d="M280 170 L292 170"/>
    <path d="M280 176 L292 176"/>
    <path d="M280 182 L290 182"/>
  </g>
  <!-- thumb -->
  <path d="M278 172 Q272 176 276 182" fill="none" stroke="#c98b5e" stroke-width="3" stroke-linecap="round"/>

  <!-- neck -->
  <path d="M190 138 L190 156 Q200 164 210 156 L210 138 Z" fill="url(#spSkin)" stroke="#c98b5e" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- ears -->
  <ellipse cx="172" cy="108" rx="7" ry="10" fill="url(#spSkin)" stroke="#c98b5e" stroke-width="2.4"/>
  <ellipse cx="228" cy="108" rx="7" ry="10" fill="url(#spSkin)" stroke="#c98b5e" stroke-width="2.4"/>

  <!-- face -->
  <path d="M174 96
           Q174 68 200 66
           Q226 68 226 96
           Q226 134 200 144
           Q174 134 174 96 Z"
        fill="url(#spSkin)" stroke="#c98b5e" stroke-width="3.4" stroke-linejoin="round"/>

  <!-- PECI (Betawi cap) -->
  <path d="M170 78
           Q170 44 200 42
           Q230 44 230 78
           Q214 70 200 70
           Q186 70 170 78 Z"
        fill="url(#spPeci)" stroke="#0a0d09" stroke-width="3.4" stroke-linejoin="round"/>
  <path d="M172 76 Q200 66 228 76" fill="none" stroke="#5a6058" stroke-width="2.6" stroke-linecap="round" opacity="0.8"/>
  <path d="M178 58 Q200 50 222 58" fill="none" stroke="#5a6058" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- eyebrows (confident) -->
  <path d="M180 96 Q188 91 196 95" fill="none" stroke="#171d16" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M204 95 Q212 91 220 96" fill="none" stroke="#171d16" stroke-width="3.2" stroke-linecap="round"/>

  <!-- eyes -->
  <g>
    <ellipse cx="188" cy="104" rx="5" ry="5.5" fill="#f5fbef"/>
    <ellipse cx="212" cy="104" rx="5" ry="5.5" fill="#f5fbef"/>
    <circle cx="189" cy="105" r="3" fill="#171d16"/>
    <circle cx="213" cy="105" r="3" fill="#171d16"/>
    <circle cx="190.3" cy="103.6" r="1" fill="#f5fbef"/>
    <circle cx="214.3" cy="103.6" r="1" fill="#f5fbef"/>
  </g>

  <!-- nose -->
  <path d="M200 106 L196 120 Q200 123 204 120 Z" fill="#e8b88a" stroke="#c98b5e" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- confident smile -->
  <path d="M188 128 Q200 137 212 128" fill="none" stroke="#b07a4a" stroke-width="3" stroke-linecap="round"/>
  <!-- cheek warmth -->
  <g fill="#ffb38a" opacity="0.45">
    <circle cx="182" cy="118" r="5"/>
    <circle cx="218" cy="118" r="5"/>
  </g>

  <!-- small grass tufts -->
  <g stroke="#006e1c" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M40 282 Q38 270 44 262"/>
    <path d="M50 284 Q52 272 46 264"/>
    <path d="M352 282 Q350 270 356 262"/>
    <path d="M362 284 Q364 272 358 264"/>
    <path d="M120 290 Q118 280 124 274"/>
    <path d="M286 290 Q288 280 282 274"/>
  </g>
</svg>
