<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="0.45" stop-color="#ffd54a"/>
      <stop offset="1" stop-color="#ffdcbe"/>
    </linearGradient>
    <linearGradient id="skMountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94f990"/>
      <stop offset="0.55" stop-color="#4caf50"/>
      <stop offset="1" stop-color="#006e1c"/>
    </linearGradient>
    <linearGradient id="skMountainBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4caf50"/>
      <stop offset="1" stop-color="#006e1c"/>
    </linearGradient>
    <linearGradient id="skBoat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2410"/>
      <stop offset="0.5" stop-color="#8b5000"/>
      <stop offset="1" stop-color="#e18500"/>
    </linearGradient>
    <linearGradient id="skLake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <radialGradient id="skSun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd54a"/>
      <stop offset="0.6" stop-color="#ffd54a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- golden sunset sky -->
  <rect x="0" y="0" width="400" height="300" fill="url(#skSky)"/>

  <!-- setting sun -->
  <circle cx="108" cy="92" r="64" fill="url(#skSun)"/>
  <circle cx="108" cy="92" r="24" fill="#ffd54a"/>

  <!-- soft golden clouds -->
  <g fill="#f5fbef" opacity="0.85">
    <ellipse cx="300" cy="52" rx="40" ry="14"/>
    <ellipse cx="332" cy="58" rx="26" ry="10"/>
  </g>
  <g fill="#ffdcbe" opacity="0.7">
    <ellipse cx="210" cy="80" rx="46" ry="9"/>
    <ellipse cx="70" cy="150" rx="40" ry="8"/>
  </g>

  <!-- distant back mountains -->
  <path d="M0 196 q60 -72 130 -30 q40 24 80 0 q70 -44 190 18 v116 H0 z"
        fill="url(#skMountainBack)" opacity="0.7"/>

  <!-- calm blue lake -->
  <path d="M0 230 q120 -20 240 6 q90 18 160 -2 v66 H0 z" fill="url(#skLake)"/>
  <!-- sun shimmer on lake -->
  <g fill="#ffd54a" opacity="0.45">
    <ellipse cx="96" cy="246" rx="30" ry="3.5"/>
    <ellipse cx="96" cy="258" rx="22" ry="3"/>
  </g>
  <!-- gentle lake ripples -->
  <g fill="none" stroke="#d1e4ff" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <path d="M170 252 q14 -8 28 0 q14 8 28 0"/>
    <path d="M250 268 q14 -8 28 0 q14 8 28 0"/>
    <path d="M40 280 q14 -8 28 0 q14 8 28 0"/>
  </g>

  <!-- the green mountain with the overturned boat on top -->
  <g>
    <!-- mountain body -->
    <path d="M150 250
             q14 -110 90 -150
             q76 40 90 150
             q-90 26 -180 0 z"
          fill="url(#skMountain)" stroke="#006e1c" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- soft mountain shading + forest texture -->
    <g fill="#006e1c" opacity="0.3">
      <ellipse cx="200" cy="222" rx="44" ry="14"/>
      <ellipse cx="278" cy="218" rx="30" ry="12"/>
    </g>
    <g fill="#94f990" opacity="0.5">
      <ellipse cx="232" cy="150" rx="26" ry="12"/>
    </g>
    <!-- little trees dotting the slope -->
    <g stroke="#006e1c" stroke-width="2.5" stroke-linejoin="round">
      <circle cx="178" cy="226" r="9" fill="#4caf50"/>
      <circle cx="300" cy="228" r="8" fill="#4caf50"/>
      <circle cx="160" cy="238" r="7" fill="#4caf50"/>
      <circle cx="318" cy="240" r="7" fill="#4caf50"/>
    </g>

    <!-- soft shadow of boat on the summit -->
    <ellipse cx="240" cy="118" rx="92" ry="14" fill="#006e1c" opacity="0.35"/>

    <!-- THE UPSIDE-DOWN WOODEN BOAT (Tangkuban Perahu) -->
    <g>
      <!-- inverted hull: flat keel up, curved gunwale resting on the peak -->
      <path d="M150 116
               q90 -70 180 0
               q-18 8 -40 8
               l-100 0
               q-22 0 -40 -8 z"
            fill="url(#skBoat)" stroke="#171d16" stroke-width="3.5" stroke-linejoin="round"/>
      <!-- upturned bow + stern tips curling up -->
      <path d="M150 116 q-14 -2 -22 -12 q12 0 22 4 z" fill="#8b5000" stroke="#171d16" stroke-width="3" stroke-linejoin="round"/>
      <path d="M330 116 q14 -2 22 -12 q-12 0 -22 4 z" fill="#8b5000" stroke="#171d16" stroke-width="3" stroke-linejoin="round"/>
      <!-- wooden plank lines along the hull -->
      <g fill="none" stroke="#3a2410" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
        <path d="M158 104 q82 -50 164 0"/>
        <path d="M168 88 q72 -40 144 0"/>
        <path d="M182 74 q58 -28 116 0"/>
      </g>
      <!-- keel ridge highlight along the top -->
      <path d="M196 62 q44 -14 88 0" fill="none" stroke="#ffdcbe" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    </g>
  </g>

  <!-- tiny figure on the lakeshore for scale -->
  <g>
    <ellipse cx="92" cy="288" rx="12" ry="4" fill="#171d16" opacity="0.3"/>
    <path d="M86 286 q0 -16 6 -16 q6 0 6 16 z" fill="#0d9488" stroke="#171d16" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="92" cy="266" r="5" fill="#e8b88a" stroke="#c98b5e" stroke-width="2"/>
    <path d="M86 268 q6 -6 12 0" fill="none" stroke="#171d16" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- friendly birds in the golden sky -->
  <g fill="none" stroke="#171d16" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <path d="M150 60 q7 -6 14 0 q7 -6 14 0"/>
    <path d="M188 44 q5 -4 10 0 q5 -4 10 0"/>
  </g>

  <!-- reeds at the lake edge -->
  <g stroke="#006e1c" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M28 292 q-2 -16 4 -26"/>
    <path d="M38 294 q2 -16 -4 -26"/>
    <path d="M372 294 q2 -16 -4 -26"/>
    <path d="M382 292 q-2 -16 4 -26"/>
  </g>
</svg>
