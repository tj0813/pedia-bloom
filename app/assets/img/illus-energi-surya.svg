<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="seSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="0.7" stop-color="#d1e4ff"/>
      <stop offset="1" stop-color="#f5fbef"/>
    </linearGradient>
    <radialGradient id="seSun" cx="0.42" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffd54a"/>
      <stop offset="0.7" stop-color="#e18500"/>
      <stop offset="1" stop-color="#8b5000"/>
    </radialGradient>
    <radialGradient id="seSunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd54a" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sePanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <linearGradient id="seGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94f990"/>
      <stop offset="1" stop-color="#4caf50"/>
    </linearGradient>
    <radialGradient id="seShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#171d16" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#171d16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#seSky)"/>

  <!-- ground / green field -->
  <path d="M0 220 q80 -18 200 -8 q120 10 200 -2 v98 H0 z" fill="url(#seGround)"/>

  <!-- sun glow -->
  <circle cx="306" cy="78" r="78" fill="url(#seSunGlow)"/>

  <!-- sun rays -->
  <g stroke="#ffd54a" stroke-width="7" stroke-linecap="round">
    <line x1="306" y1="6" x2="306" y2="26"/>
    <line x1="306" y1="130" x2="306" y2="150"/>
    <line x1="234" y1="78" x2="254" y2="78"/>
    <line x1="358" y1="78" x2="378" y2="78"/>
    <line x1="255" y1="27" x2="269" y2="41"/>
    <line x1="343" y1="115" x2="357" y2="129"/>
    <line x1="357" y1="27" x2="343" y2="41"/>
    <line x1="269" y1="115" x2="255" y2="129"/>
  </g>

  <!-- friendly smiling sun -->
  <g stroke="#8b5000" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="306" cy="78" r="42" fill="url(#seSun)"/>
  </g>
  <!-- sun face: eyes + cheeks + smile -->
  <g fill="#8b5000" stroke="none">
    <circle cx="292" cy="70" r="4.5"/>
    <circle cx="320" cy="70" r="4.5"/>
  </g>
  <g fill="#ba1a1a" opacity="0.35" stroke="none">
    <circle cx="288" cy="86" r="6"/>
    <circle cx="324" cy="86" r="6"/>
  </g>
  <path d="M292 88 q14 16 28 0" fill="none" stroke="#8b5000" stroke-width="3.5" stroke-linecap="round"/>

  <!-- sunlight beams hitting the panel -->
  <g stroke="#ffd54a" stroke-width="4" stroke-linecap="round" opacity="0.65">
    <line x1="278" y1="104" x2="176" y2="176"/>
    <line x1="296" y1="122" x2="200" y2="190"/>
    <line x1="262" y1="120" x2="160" y2="196"/>
  </g>

  <!-- soft shadow under the solar panel -->
  <ellipse cx="150" cy="252" rx="104" ry="16" fill="url(#seShadow)"/>

  <!-- solar panel support post -->
  <g stroke="#171d16" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="120" y="206" width="14" height="44" rx="5" fill="#94f990"/>
    <rect x="174" y="206" width="14" height="44" rx="5" fill="#4caf50"/>
  </g>

  <!-- tilted solar panel grid (3 x 2 blue cells) -->
  <g stroke="#171d16" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- panel frame, tilted toward the sun -->
    <path d="M70 196 L150 156 L246 168 L168 214 Z" fill="url(#sePanel)"/>
  </g>
  <!-- cell grid lines (inside the tilted panel) -->
  <g stroke="#d1e4ff" stroke-width="2.4" stroke-linecap="round" opacity="0.9">
    <!-- lines following the two tilt directions -->
    <line x1="102" y1="183" x2="194" y2="195"/>
    <line x1="134" y1="170" x2="220" y2="181"/>
    <line x1="103" y1="183" x2="129" y2="168"/>
    <line x1="146" y1="194" x2="178" y2="176"/>
    <line x1="189" y1="204" x2="225" y2="183"/>
  </g>
  <!-- panel shine highlight -->
  <path d="M86 186 L150 154 L150 162 L96 192 Z" fill="#d1e4ff" opacity="0.4" stroke="none"/>

  <!-- small friendly house in the field -->
  <g stroke="#171d16" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="296" y="208" width="58" height="44" rx="4" fill="#ffdcbe"/>
    <path d="M290 208 L325 180 L360 208 Z" fill="#ba1a1a"/>
    <rect x="318" y="226" width="16" height="26" rx="2" fill="#8b5000"/>
    <rect x="302" y="216" width="12" height="12" rx="2" fill="#33a0fd"/>
  </g>

  <!-- little bushes -->
  <g stroke="#006e1c" stroke-width="3" stroke-linejoin="round">
    <circle cx="40" cy="250" r="13" fill="#4caf50"/>
    <circle cx="246" cy="250" r="12" fill="#4caf50"/>
  </g>
</svg>
