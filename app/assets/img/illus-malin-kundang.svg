<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="mkSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="0.5" stop-color="#ffd54a"/>
      <stop offset="1" stop-color="#ffdcbe"/>
    </linearGradient>
    <linearGradient id="mkSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <linearGradient id="mkHull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e18500"/>
      <stop offset="1" stop-color="#8b5000"/>
    </linearGradient>
    <linearGradient id="mkSail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5fbef"/>
      <stop offset="1" stop-color="#ffdcbe"/>
    </linearGradient>
    <linearGradient id="mkSailRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdcbe"/>
      <stop offset="1" stop-color="#ba1a1a"/>
    </linearGradient>
    <linearGradient id="mkRock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94f990"/>
      <stop offset="0.4" stop-color="#8b5000"/>
      <stop offset="1" stop-color="#3a2410"/>
    </linearGradient>
    <radialGradient id="mkSun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd54a"/>
      <stop offset="0.7" stop-color="#ffd54a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="400" height="300" fill="url(#mkSky)"/>

  <!-- warm setting sun glow -->
  <circle cx="288" cy="118" r="70" fill="url(#mkSun)"/>
  <circle cx="288" cy="118" r="26" fill="#ffd54a"/>

  <!-- soft sunset clouds -->
  <g fill="#f5fbef" opacity="0.9">
    <ellipse cx="78" cy="58" rx="38" ry="15"/>
    <ellipse cx="108" cy="64" rx="26" ry="11"/>
    <ellipse cx="330" cy="52" rx="30" ry="12"/>
  </g>
  <g fill="#ffdcbe" opacity="0.7">
    <ellipse cx="150" cy="92" rx="44" ry="10"/>
    <ellipse cx="250" cy="78" rx="40" ry="9"/>
  </g>

  <!-- sea -->
  <rect x="0" y="170" width="400" height="130" fill="url(#mkSea)"/>

  <!-- shimmering sun reflection on water -->
  <g fill="#ffd54a" opacity="0.5">
    <ellipse cx="288" cy="182" rx="34" ry="4"/>
    <ellipse cx="288" cy="196" rx="26" ry="3.5"/>
    <ellipse cx="288" cy="210" rx="18" ry="3"/>
  </g>

  <!-- gentle wave crests -->
  <g fill="none" stroke="#d1e4ff" stroke-width="3.5" stroke-linecap="round" opacity="0.85">
    <path d="M20 206 q14 -9 28 0 q14 9 28 0"/>
    <path d="M96 224 q14 -9 28 0 q14 9 28 0"/>
    <path d="M40 252 q16 -10 32 0 q16 10 32 0"/>
    <path d="M150 246 q16 -10 32 0 q16 10 32 0"/>
    <path d="M300 248 q16 -10 32 0 q16 10 32 0"/>
  </g>

  <!-- the grand sailing ship -->
  <g>
    <!-- soft shadow on water -->
    <ellipse cx="170" cy="232" rx="118" ry="12" fill="#171d16" opacity="0.18"/>

    <!-- masts -->
    <g stroke="#3a2410" stroke-width="4.5" stroke-linecap="round">
      <line x1="142" y1="226" x2="142" y2="60"/>
      <line x1="208" y1="222" x2="208" y2="44"/>
    </g>

    <!-- main red striped sail -->
    <path d="M210 56 q52 22 50 110 l-52 6 z" fill="url(#mkSailRed)" stroke="#8b5000" stroke-width="3" stroke-linejoin="round"/>
    <g stroke="#ba1a1a" stroke-width="5" opacity="0.55">
      <line x1="216" y1="92" x2="246" y2="100"/>
      <line x1="214" y1="128" x2="252" y2="138"/>
    </g>
    <!-- main cream sail (front) -->
    <path d="M206 54 q-50 24 -48 116 l48 4 z" fill="url(#mkSail)" stroke="#8b5000" stroke-width="3" stroke-linejoin="round"/>

    <!-- foresail -->
    <path d="M144 64 q-40 18 -38 92 l38 2 z" fill="url(#mkSail)" stroke="#8b5000" stroke-width="3" stroke-linejoin="round"/>
    <path d="M146 64 q34 16 34 80 l-34 4 z" fill="url(#mkSailRed)" stroke="#8b5000" stroke-width="3" stroke-linejoin="round"/>

    <!-- pennant flags on top -->
    <g fill="#ba1a1a">
      <path d="M208 44 l22 6 -22 6 z"/>
      <path d="M142 60 l18 5 -18 5 z"/>
    </g>

    <!-- ship hull -->
    <path d="M64 220
             q4 28 44 30
             l128 0
             q40 -2 44 -30
             q-18 10 -52 12
             l-112 0
             q-34 -2 -52 -12 z"
          fill="url(#mkHull)" stroke="#3a2410" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- hull deck rail -->
    <path d="M64 220 q90 14 172 0" fill="none" stroke="#ffdcbe" stroke-width="3" stroke-linecap="round"/>
    <!-- gold trim band -->
    <path d="M70 232 q86 12 160 0" fill="none" stroke="#ffd54a" stroke-width="3" stroke-linecap="round"/>
    <!-- round portholes -->
    <g fill="#3a2410" stroke="#ffd54a" stroke-width="2">
      <circle cx="108" cy="236" r="5"/>
      <circle cx="150" cy="238" r="5"/>
      <circle cx="192" cy="236" r="5"/>
    </g>
  </g>

  <!-- rocky beach with the kneeling-figure stone (Batu Malin Kundang) -->
  <g>
    <!-- base rocks -->
    <path d="M300 300 q-6 -44 30 -56 q40 -12 70 8 l0 48 z" fill="url(#mkRock)" stroke="#3a2410" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- kneeling stone figure: rounded bowed head + back, knee -->
    <g fill="url(#mkRock)" stroke="#3a2410" stroke-width="3.5" stroke-linejoin="round">
      <!-- bowed body/back -->
      <path d="M328 286
               q-10 -34 8 -52
               q14 -14 30 -6
               q12 7 10 24
               q-2 18 6 34
               z"/>
      <!-- bowed head -->
      <circle cx="338" cy="226" r="15"/>
    </g>
    <!-- soft sculpted highlights on the stone -->
    <g fill="none" stroke="#ffdcbe" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
      <path d="M330 240 q-6 18 -2 40"/>
      <path d="M348 230 q6 22 2 46"/>
    </g>
    <!-- little grass tufts on the rock -->
    <g stroke="#006e1c" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M306 268 q-2 -10 4 -16"/>
      <path d="M392 256 q2 -10 -4 -16"/>
    </g>
  </g>

  <!-- gentle foam where sea meets rocks -->
  <g fill="#f5fbef" opacity="0.85">
    <circle cx="304" cy="272" r="6"/>
    <circle cx="314" cy="276" r="5"/>
    <circle cx="296" cy="278" r="4"/>
  </g>

  <!-- friendly seabirds -->
  <g fill="none" stroke="#171d16" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <path d="M70 110 q8 -7 16 0 q8 -7 16 0"/>
    <path d="M120 86 q6 -5 12 0 q6 -5 12 0"/>
  </g>
</svg>
