<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bbSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d1e4ff"/>
      <stop offset="1" stop-color="#f5fbef"/>
    </linearGradient>
    <linearGradient id="bbGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94f990"/>
      <stop offset="1" stop-color="#4caf50"/>
    </linearGradient>
    <linearGradient id="bbSpadix" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdcbe"/>
      <stop offset="0.5" stop-color="#f5e7a0"/>
      <stop offset="1" stop-color="#e1c878"/>
    </linearGradient>
    <linearGradient id="bbSpatheIn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b2a4a"/>
      <stop offset="1" stop-color="#5a1230"/>
    </linearGradient>
    <linearGradient id="bbSpatheEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8324f"/>
      <stop offset="1" stop-color="#7a1f3d"/>
    </linearGradient>
    <linearGradient id="bbLeaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4caf50"/>
      <stop offset="1" stop-color="#006e1c"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="300" fill="url(#bbSky)"/>

  <!-- distant layered rainforest foliage -->
  <g opacity="0.55">
    <ellipse cx="60" cy="150" rx="90" ry="120" fill="#4caf50"/>
    <ellipse cx="340" cy="150" rx="95" ry="125" fill="#4caf50"/>
    <ellipse cx="120" cy="120" rx="70" ry="90" fill="#94f990"/>
    <ellipse cx="290" cy="125" rx="75" ry="95" fill="#94f990"/>
  </g>
  <g opacity="0.7">
    <ellipse cx="40" cy="200" rx="70" ry="100" fill="#006e1c"/>
    <ellipse cx="365" cy="205" rx="75" ry="105" fill="#006e1c"/>
  </g>

  <!-- ground -->
  <ellipse cx="200" cy="285" rx="240" ry="55" fill="url(#bbGround)"/>

  <!-- soft shadow under plant -->
  <ellipse cx="200" cy="272" rx="95" ry="16" fill="#171d16" opacity="0.16"/>

  <!-- base foliage leaves around pot -->
  <g stroke="#006e1c" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M150 268 Q108 250 96 214 Q140 226 156 258 Z" fill="url(#bbLeaf)"/>
    <path d="M250 268 Q292 250 304 214 Q260 226 244 258 Z" fill="url(#bbLeaf)"/>
  </g>

  <!-- ruffled SPATHE (frilly collar/skirt) - outer green back layer -->
  <path d="M200 268
           Q120 262 110 200
           Q108 168 130 150
           Q120 184 150 196
           Q138 162 160 148
           Q156 184 184 192
           Q180 156 200 150
           Q220 156 216 192
           Q244 184 240 148
           Q262 162 250 196
           Q280 184 270 150
           Q292 168 290 200
           Q280 262 200 268 Z"
        fill="#4caf50" stroke="#006e1c" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- ruffled SPATHE inner maroon/burgundy face -->
  <path d="M200 262
           Q138 256 128 204
           Q126 182 142 168
           Q136 196 162 206
           Q150 176 168 166
           Q166 196 188 202
           Q184 172 200 167
           Q216 172 212 202
           Q234 196 232 166
           Q250 176 238 206
           Q264 196 258 168
           Q274 182 272 204
           Q262 256 200 262 Z"
        fill="url(#bbSpatheIn)" stroke="#7a1f3d" stroke-width="3" stroke-linejoin="round"/>

  <!-- inner spathe ridges/veins -->
  <g stroke="#a8324f" stroke-width="2" stroke-linecap="round" opacity="0.7" fill="none">
    <path d="M200 250 L160 200"/>
    <path d="M200 250 L180 198"/>
    <path d="M200 250 L200 196"/>
    <path d="M200 250 L220 198"/>
    <path d="M200 250 L240 200"/>
  </g>

  <!-- TALL tapering central SPADIX (creamy-yellow spike pointing straight up) -->
  <path d="M186 214
           Q188 120 196 56
           Q198 40 200 32
           Q202 40 204 56
           Q212 120 214 214
           Z"
        fill="url(#bbSpadix)" stroke="#c9a84e" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- spadix highlight -->
  <path d="M194 210 Q196 120 200 50" fill="none" stroke="#fff6d8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- subtle texture dots on spadix -->
  <g fill="#c9a84e" opacity="0.45">
    <circle cx="204" cy="90" r="1.6"/>
    <circle cx="207" cy="120" r="1.6"/>
    <circle cx="208" cy="150" r="1.6"/>
    <circle cx="206" cy="180" r="1.6"/>
    <circle cx="193" cy="100" r="1.6"/>
    <circle cx="192" cy="135" r="1.6"/>
    <circle cx="191" cy="170" r="1.6"/>
  </g>

  <!-- foreground grass blades -->
  <g stroke="#006e1c" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M118 280 Q116 264 124 252"/>
    <path d="M130 282 Q132 268 126 256"/>
    <path d="M276 282 Q280 266 272 254"/>
    <path d="M288 280 Q286 264 294 252"/>
  </g>
</svg>
