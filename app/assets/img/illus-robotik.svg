<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="rbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d1e4ff"/>
      <stop offset="1" stop-color="#94f990"/>
    </linearGradient>
    <linearGradient id="rbHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <linearGradient id="rbBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#006e1c"/>
    </linearGradient>
    <linearGradient id="rbScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171d16"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="rbShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#171d16" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#171d16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#rbBg)"/>

  <!-- ground shadow -->
  <ellipse cx="200" cy="262" rx="92" ry="18" fill="url(#rbShadow)"/>

  <g stroke="#171d16" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">

    <!-- antenna -->
    <line x1="200" y1="70" x2="200" y2="50" fill="none"/>
    <circle cx="200" cy="44" r="9" fill="#e18500"/>

    <!-- arms -->
    <path d="M126 168 q-26 6 -30 34" fill="none" stroke-width="9" stroke="#0d9488"/>
    <circle cx="96" cy="206" r="11" fill="#94f990"/>
    <path d="M274 168 q26 6 30 34" fill="none" stroke-width="9" stroke="#0d9488"/>
    <circle cx="304" cy="206" r="11" fill="#94f990"/>

    <!-- legs -->
    <rect x="164" y="234" width="20" height="22" rx="7" fill="#0061a4"/>
    <rect x="216" y="234" width="20" height="22" rx="7" fill="#0061a4"/>

    <!-- body -->
    <rect x="142" y="148" width="116" height="92" rx="22" fill="url(#rbBody)"/>

    <!-- heart on chest -->
    <path d="M200 178
             q-12 -14 -24 -4
             q-12 10 24 32
             q36 -22 24 -32
             q-12 -10 -24 4 z" fill="#ba1a1a"/>

    <!-- head -->
    <rect x="132" y="74" width="136" height="86" rx="26" fill="url(#rbHead)"/>

    <!-- ears / side bolts -->
    <rect x="120" y="104" width="16" height="28" rx="7" fill="#e18500"/>
    <rect x="264" y="104" width="16" height="28" rx="7" fill="#e18500"/>

    <!-- screen face -->
    <rect x="150" y="92" width="100" height="52" rx="16" fill="url(#rbScreen)"/>
  </g>

  <!-- eyes (no dark stroke for glow) -->
  <circle cx="178" cy="112" r="9" fill="#d1e4ff"/>
  <circle cx="222" cy="112" r="9" fill="#d1e4ff"/>
  <circle cx="180" cy="114" r="3.5" fill="#171d16"/>
  <circle cx="224" cy="114" r="3.5" fill="#171d16"/>

  <!-- smile -->
  <path d="M182 128 q18 14 36 0" fill="none" stroke="#94f990" stroke-width="3.5" stroke-linecap="round"/>

  <!-- cheek glow -->
  <circle cx="164" cy="128" r="5" fill="#33a0fd" opacity="0.55"/>
  <circle cx="236" cy="128" r="5" fill="#33a0fd" opacity="0.55"/>
</svg>
