<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2a5e"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <linearGradient id="tdBlanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <linearGradient id="tdPillow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5fbef"/>
      <stop offset="1" stop-color="#d1e4ff"/>
    </linearGradient>
    <linearGradient id="tdMoon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdcbe"/>
      <stop offset="1" stop-color="#e18500"/>
    </linearGradient>
    <radialGradient id="tdShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#171d16" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#171d16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#tdBg)"/>

  <!-- stars scattered in the night sky -->
  <g fill="#d1e4ff">
    <path d="M70 56 l4 11 l11 4 l-11 4 l-4 11 l-4 -11 l-11 -4 l11 -4 z"/>
    <path d="M150 38 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z"/>
    <path d="M330 86 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z"/>
    <circle cx="118" cy="92" r="2.6"/>
    <circle cx="262" cy="50" r="2.6"/>
    <circle cx="356" cy="150" r="2.6"/>
    <circle cx="44" cy="128" r="2.6"/>
  </g>

  <!-- crescent moon (upper right) -->
  <path d="M324 40 a40 40 0 1 0 30 64 a32 32 0 1 1 -30 -64 z" fill="url(#tdMoon)" stroke="#8b5000" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Zzz floating above the child -->
  <text x="206" y="118" font-family="Verdana, Geneva, sans-serif" font-weight="bold" fill="#94f990">
    <tspan font-size="34">Z</tspan><tspan font-size="26" dx="-2" dy="-8">z</tspan><tspan font-size="18" dx="-2" dy="-8">z</tspan>
  </text>

  <!-- ground shadow under bed -->
  <ellipse cx="200" cy="276" rx="150" ry="16" fill="url(#tdShadow)"/>

  <g stroke="#171d16" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">

    <!-- mattress base -->
    <rect x="44" y="214" width="312" height="56" rx="18" fill="#0d9488"/>

    <!-- pillow -->
    <rect x="62" y="170" width="96" height="56" rx="22" fill="url(#tdPillow)"/>

    <!-- child's head resting on pillow -->
    <circle cx="124" cy="190" r="34" fill="#ffdcbe"/>

    <!-- hair tuft -->
    <path d="M100 168 q14 -22 44 -10 q-12 -2 -18 6 q-12 -6 -26 4 z" fill="#8b5000"/>

    <!-- cozy blanket draped over the body -->
    <path d="M150 226 q40 -34 110 -24 q60 8 96 24 q6 22 -2 44 h-296 q-4 -30 -8 -44 q50 -8 100 0 z" fill="url(#tdBlanket)"/>

    <!-- folded blanket top edge -->
    <path d="M150 226 q40 -22 110 -14 q60 7 96 22" fill="none" stroke="#d1e4ff" stroke-width="6"/>
  </g>

  <!-- peaceful sleeping face (no dark stroke for soft look) -->
  <path d="M110 192 q7 -7 14 0" fill="none" stroke="#171d16" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M128 192 q7 -7 14 0" fill="none" stroke="#171d16" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M118 208 q8 7 16 0" fill="none" stroke="#8b5000" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="102" cy="204" r="6" fill="#ba1a1a" opacity="0.35"/>
  <circle cx="146" cy="204" r="6" fill="#ba1a1a" opacity="0.35"/>
</svg>
