<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="waSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0061a4"/>
      <stop offset="0.55" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#d1e4ff"/>
    </linearGradient>
    <radialGradient id="waSun" cx="0.42" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffd54a"/>
      <stop offset="0.75" stop-color="#e18500"/>
      <stop offset="1" stop-color="#8b5000"/>
    </radialGradient>
    <linearGradient id="waSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33a0fd"/>
      <stop offset="1" stop-color="#0061a4"/>
    </linearGradient>
    <linearGradient id="waMountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94f990"/>
      <stop offset="0.6" stop-color="#4caf50"/>
      <stop offset="1" stop-color="#006e1c"/>
    </linearGradient>
    <linearGradient id="waCloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5fbef"/>
      <stop offset="1" stop-color="#d1e4ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#waSky)"/>

  <!-- sun, top-left, warming the sea -->
  <g stroke="#8b5000" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="58" cy="56" r="32" fill="url(#waSun)"/>
  </g>
  <g stroke="#ffd54a" stroke-width="5" stroke-linecap="round">
    <line x1="58" y1="8" x2="58" y2="20"/>
    <line x1="14" y1="56" x2="26" y2="56"/>
    <line x1="26" y1="24" x2="35" y2="33"/>
    <line x1="90" y1="24" x2="81" y2="33"/>
    <line x1="22" y1="90" x2="33" y2="81"/>
  </g>
  <!-- tiny sun smile -->
  <path d="M48 60 q10 10 20 0" fill="none" stroke="#8b5000" stroke-width="3" stroke-linecap="round"/>
  <g fill="#8b5000" stroke="none">
    <circle cx="49" cy="50" r="3"/>
    <circle cx="67" cy="50" r="3"/>
  </g>

  <!-- rain cloud, top-right, over the mountain -->
  <g fill="url(#waCloud)" stroke="#0061a4" stroke-width="3" stroke-linejoin="round">
    <path d="M268 78
             a24 24 0 0 1 46 -8
             a20 20 0 0 1 36 12
             a18 18 0 0 1 -6 35
             h-66
             a20 20 0 0 1 -10 -39 z"/>
  </g>
  <!-- falling rain -->
  <g stroke="#33a0fd" stroke-width="4" stroke-linecap="round">
    <line x1="284" y1="120" x2="278" y2="140"/>
    <line x1="306" y1="120" x2="300" y2="142"/>
    <line x1="328" y1="120" x2="322" y2="140"/>
    <line x1="294" y1="146" x2="289" y2="162"/>
    <line x1="316" y1="146" x2="311" y2="162"/>
  </g>

  <!-- green mountain (rain falls on it) -->
  <g stroke="#006e1c" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M236 246 q34 -96 74 -120 q40 24 74 120 z" fill="url(#waMountain)"/>
    <!-- snow / light cap -->
    <path d="M292 156 q18 -14 36 0 q-10 12 -18 12 q-8 0 -18 -12 z" fill="#f5fbef" stroke="none"/>
  </g>

  <!-- sea filling the bottom -->
  <path d="M0 222 q60 -8 120 0 q120 12 280 -2 v82 H0 z" fill="url(#waSea)"/>
  <!-- sea wave highlights -->
  <g stroke="#d1e4ff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M24 244 q16 -8 32 0 q16 8 32 0"/>
    <path d="M120 258 q16 -8 32 0 q16 8 32 0"/>
    <path d="M30 274 q16 -8 32 0 q16 8 32 0"/>
  </g>

  <!-- river flowing from the mountain back down to the sea -->
  <path d="M300 178 q-6 26 -30 44 q-26 20 -34 44" fill="none" stroke="#33a0fd" stroke-width="13" stroke-linecap="round"/>
  <path d="M300 178 q-6 26 -30 44 q-26 20 -34 44" fill="none" stroke="#d1e4ff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- evaporation: droplets rising from the sea up toward the sun -->
  <g fill="#d1e4ff" stroke="#0061a4" stroke-width="2">
    <path d="M96 196 q-6 -8 0 -14 q6 6 0 14 z"/>
    <path d="M120 176 q-5 -7 0 -12 q5 5 0 12 z"/>
    <path d="M80 168 q-5 -7 0 -12 q5 5 0 12 z"/>
    <path d="M104 146 q-4 -6 0 -10 q4 4 0 10 z"/>
  </g>

  <!-- big curved cycle arrows showing the loop -->
  <!-- arrow 1: sea -> up to sun/cloud (evaporation, left side rising) -->
  <g fill="none" stroke="#f5fbef" stroke-width="5" stroke-linecap="round" opacity="0.95">
    <path d="M110 210 q-34 -56 -22 -116"/>
  </g>
  <path d="M88 94 l-9 16 17 -2 z" fill="#f5fbef" stroke="none"/>

  <!-- arrow 2: sun region -> across to the rain cloud (top, moving right) -->
  <g fill="none" stroke="#ffd54a" stroke-width="5" stroke-linecap="round" opacity="0.95">
    <path d="M104 42 q90 -26 158 28"/>
  </g>
  <path d="M262 70 l-16 -6 4 17 z" fill="#ffd54a" stroke="none"/>

  <!-- arrow 3: cloud/mountain -> back down to the sea (right side, falling) -->
  <g fill="none" stroke="#33a0fd" stroke-width="5" stroke-linecap="round" opacity="0.95">
    <path d="M360 110 q26 70 -30 118"/>
  </g>
  <path d="M330 228 l16 4 -2 -17 z" fill="#33a0fd" stroke="none"/>
</svg>
