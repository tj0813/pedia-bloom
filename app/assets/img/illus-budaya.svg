<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="buBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdcbe"/>
      <stop offset="1" stop-color="#e1a86a"/>
    </linearGradient>
    <linearGradient id="buGun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e18500"/>
      <stop offset="1" stop-color="#8b5000"/>
    </linearGradient>
    <linearGradient id="buGunCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdcbe"/>
      <stop offset="1" stop-color="#f5d59a"/>
    </linearGradient>
    <radialGradient id="buShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#171d16" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#171d16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#buBg)"/>

  <!-- batik parang / swirl pattern in background -->
  <g fill="none" stroke="#8b5000" stroke-width="3.5" stroke-linecap="round" opacity="0.22">
    <path d="M-10 80 q30 -30 60 0 q30 30 60 0 q30 -30 60 0"/>
    <path d="M-10 120 q30 -30 60 0 q30 30 60 0 q30 -30 60 0"/>
    <path d="M220 70 q30 -30 60 0 q30 30 60 0 q30 -30 60 0"/>
    <path d="M220 110 q30 -30 60 0 q30 30 60 0 q30 -30 60 0"/>
    <path d="M-10 210 q30 -30 60 0 q30 30 60 0 q30 -30 60 0 q30 -30 60 0 q30 30 60 0 q30 -30 60 0 q30 30 60 0"/>
    <path d="M-10 250 q30 -30 60 0 q30 30 60 0 q30 -30 60 0 q30 -30 60 0 q30 30 60 0 q30 -30 60 0 q30 30 60 0"/>
  </g>
  <!-- batik dots -->
  <g fill="#8b5000" opacity="0.18">
    <circle cx="56" cy="172" r="5"/>
    <circle cx="118" cy="186" r="5"/>
    <circle cx="288" cy="176" r="5"/>
    <circle cx="346" cy="186" r="5"/>
  </g>

  <!-- ground shadow -->
  <ellipse cx="200" cy="272" rx="86" ry="14" fill="url(#buShadow)"/>

  <g stroke="#171d16" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">

    <!-- gunungan outer leaf/mountain shape -->
    <path d="M200 32
             C150 60 138 120 142 176
             C144 214 168 246 200 262
             C232 246 256 214 258 176
             C262 120 250 60 200 32 Z" fill="url(#buGun)"/>

    <!-- inner ornamental panel -->
    <path d="M200 64
             C170 84 162 126 164 168
             C166 200 182 226 200 238
             C218 226 234 200 236 168
             C238 126 230 84 200 64 Z" fill="url(#buGunCore)"/>

    <!-- base stand -->
    <rect x="170" y="258" width="60" height="12" rx="6" fill="#8b5000"/>
  </g>

  <!-- gunungan cutout ornaments (no stroke, carved look) -->
  <g fill="#8b5000">
    <!-- central tree-of-life trunk -->
    <path d="M196 232 v-66 q-4 -16 4 -16 q8 0 4 16 v66 z"/>
    <!-- arched gate / kala face at base -->
    <path d="M178 226 q22 18 44 0 q-2 -16 -22 -16 q-20 0 -22 16 z"/>
    <!-- twin guardian birds (mirrored) -->
    <path d="M180 150 q-12 -6 -16 6 q10 4 16 -2 z"/>
    <path d="M220 150 q12 -6 16 6 q-10 4 -16 -2 z"/>
    <!-- crown leaf at apex -->
    <path d="M200 96 q-7 -16 0 -30 q7 14 0 30 z"/>
    <!-- decorative cut openings -->
    <circle cx="200" cy="120" r="5"/>
    <circle cx="184" cy="182" r="4"/>
    <circle cx="216" cy="182" r="4"/>
    <circle cx="200" cy="206" r="4"/>
  </g>

  <!-- small batik accent dots on the inner panel -->
  <g fill="#e18500" opacity="0.7">
    <circle cx="178" cy="138" r="2.6"/>
    <circle cx="222" cy="138" r="2.6"/>
    <circle cx="200" cy="158" r="2.6"/>
  </g>
</svg>
