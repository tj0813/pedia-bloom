<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SVG_START:ANIMATION_56 class="fixed inset-0 w-full h-full" --><div class="fixed inset-0 w-full h-full" id="animated-svg-ANIMATION_56" style="display:block;"><svg height="200" viewbox="0 0 200 200" width="200" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialgradient cx="50%" cy="50%" fx="50%" fy="50%" id="bloomGradient" r="50%">
<stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0"></stop>
</radialgradient>
</defs>
<!-- Outer Petals -->
<g transform="translate(100, 100)">
<circle fill="url(#bloomGradient)" r="40">
<animate attributename="r" dur="3s" repeatcount="indefinite" values="35;45;35"></animate>
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.4;0.8;0.4"></animate>
</circle>
<!-- Rotating Sparkles -->
<g>
<animatetransform attributename="transform" dur="10s" from="0" repeatcount="indefinite" to="360" type="rotate"></animatetransform>
<circle cx="50" cy="0" fill="#2dd4bf" r="4">
<animate attributename="opacity" dur="2s" repeatcount="indefinite" values="0.2;1;0.2"></animate>
</circle>
<circle cx="-50" cy="0" fill="#2dd4bf" r="4">
<animate attributename="opacity" dur="2s" repeatcount="indefinite" values="1;0.2;1"></animate>
</circle>
<circle cx="0" cy="50" fill="#2dd4bf" r="4">
<animate attributename="opacity" dur="2.5s" repeatcount="indefinite" values="0.2;1;0.2"></animate>
</circle>
<circle cx="0" cy="-50" fill="#2dd4bf" r="4">
<animate attributename="opacity" dur="2.5s" repeatcount="indefinite" values="1;0.2;1"></animate>
</circle>
</g>
</g>
</svg></div><!-- STITCH_SVG_END:ANIMATION_56 -->
</body>
</html>
